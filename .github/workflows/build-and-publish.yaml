name: Build and push image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - ".dockerignore"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: peej11/rsync

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build metadata
        id: vars
        run: |
          echo "timestamp=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          rsync_version=$(sed -n 's/^ARG RSYNC_VERSION="\{0,1\}\([^"]*\)"\{0,1\}.*/\1/p' Dockerfile)
          alpine_version=$(sed -n 's/^FROM alpine:\([0-9][0-9.]*\).*/\1/p' Dockerfile)
          echo "rsync_version=${rsync_version}" >> "$GITHUB_OUTPUT"
          echo "alpine_version=${alpine_version}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ steps.vars.outputs.rsync_version }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.vars.outputs.rsync_version }}-alpine${{ steps.vars.outputs.alpine_version }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.vars.outputs.timestamp }}-sha-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # Scheduled runs rebuild from scratch so new base/package versions land.
          pull: true
          no-cache: ${{ github.event_name == 'schedule' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
